<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>安心にもどるナビ</title>

  <link
    rel="stylesheet"
    href="boss-anshin.css"
  >
</head>

<body>

  <div class="main-card">

    <!-- 入力画面 -->
    <div id="inputScreen">

      <h1>💫 安心にもどるナビ 💫</h1>

      <p class="desc">
        「でも」「どうせ」「無理かも」の奥にある気持ちを、<br>
        やさしく見つけて安心にもどるナビです😊
      </p>


      <div class="input-box">

        <label for="theme">
          🌱 どうなったら嬉しい？
        </label>

        <input
          id="theme"
          type="text"
          placeholder="例：私は○○になりたい🌈"
        >

      </div>


      <div class="input-box">

        <div class="input-title">
          今の気持ちに近いものを選んでね🌿
        </div>

        <p class="input-note">
          いくつ選んでも大丈夫です😊
        </p>

        <div class="check-list">

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="でも時間がない"
            >
            <span>でも時間がない</span>
          </label>

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="でもお金がない"
            >
            <span>でもお金がない</span>
          </label>

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="でも働きに行けない"
            >
            <span>でも働きに行けない</span>
          </label>

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="どうせ私には無理"
            >
            <span>どうせ私には無理</span>
          </label>

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="どうせ変わらない"
            >
            <span>どうせ変わらない</span>
          </label>

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="どうせ続かない"
            >
            <span>どうせ続かない</span>
          </label>

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="失敗したくない"
            >
            <span>失敗したくない</span>
          </label>

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="人の目が気になる"
            >
            <span>人の目が気になる</span>
          </label>

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="ちゃんとしなきゃ"
            >
            <span>ちゃんとしなきゃ</span>
          </label>

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="やらなきゃ"
            >
            <span>やらなきゃ</span>
          </label>

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="完璧でなきゃ"
            >
            <span>完璧でなきゃ</span>
          </label>

          <label class="check-item">
            <input
              type="checkbox"
              class="block-check"
              value="まだ足りない"
            >
            <span>まだ足りない</span>
          </label>

        </div>

      </div>


      <div class="input-box">

        <label for="customBlocks">
          自分の言葉も書けます😊
        </label>

        <textarea
          id="customBlocks"
          placeholder="例：採用されない気がする。家でできる仕事が見つからない。"
        ></textarea>

      </div>


      <!-- チェック項目と自由入力をまとめて入れる場所 -->
      <textarea
        id="blocks"
        class="hidden"
        aria-hidden="true"
      ></textarea>


      <!-- 思い出ナビ -->
      <div class="memory-link-box">

        <div class="memory-link-title">
          🌱 もし思い出したことがあれば
        </div>

        <div class="memory-link-text">
          子どもの頃や家族のことなど、<br>
          今の気持ちにつながることを<br>
          やさしく振り返れます😊
          <br><br>
          思い出さなくても大丈夫です🌿
        </div>

        <div
          id="memorySavedNote"
          class="memory-saved-note hidden"
        >
          🌈 思い出したことが保存されています
        </div>

        <button
          class="memory-btn"
          onclick="goToMemory()"
        >
          やさしい思い出ナビへ🌱
        </button>

      </div>


      <!-- カードを引く -->
      <div class="draw-area">

        <div class="draw-title">
          🌿 安心にもどるカードを引く
        </div>

        <p class="draw-note">
          今の気持ちに合う枚数を選んでね😊
        </p>

        <div class="draw-buttons">

          <button
            class="boss-btn"
            onclick="startDrawOne()"
          >
            1枚
          </button>

          <button
            class="boss-btn"
            onclick="startDrawThree()"
          >
            3枚
          </button>

        </div>

      </div>


      <div class="button-group">

        <button
          class="back-btn"
          onclick="location.href='index.html'"
        >
          🏠 メニューにもどる
        </button>

      </div>

    </div>


    <!-- カード結果画面 -->
    <div
      id="cardScreen"
      class="hidden"
    >

      <h1>🌈 安心にもどるカード 🌈</h1>

      <p class="desc">
        今のあなたに出てきたカードを<br>
        やさしく眺めてみてね😊
      </p>


      <div
        id="cardsArea"
        class="cards-area"
      ></div>


      <button
        id="copyBtn"
        class="copy-btn"
        onclick="copyPrompt()"
        disabled
      >
        🐶 チャッピーGPTへ送る文章をコピー
      </button>


      <p class="note">
        AIの答えは絶対ではなく、<br>
        今の自分をやさしく整理するためのヒントです🌿
      </p>


      <div class="button-group">

        <button
          class="back-btn"
          onclick="backToInput()"
        >
          ↩️ 入力画面に戻る
        </button>

        <button
          class="back-btn"
          onclick="location.href='https://chappy-sally.github.io/chappy-sally-anshin-navi/'"
        >
          🏠 メニューにもどる
        </button>

      </div>

    </div>

  </div>


  <script src="boss-anshin.js?v=2"></script>


  <script>
    /* 選んだ気持ちと自由入力をまとめる */
    function collectBlocks(){
      const selected = [];

      document
        .querySelectorAll(".block-check:checked")
        .forEach((checkbox) => {
          selected.push(checkbox.value);
        });

      const customText =
        document
          .getElementById("customBlocks")
          .value
          .trim();

      if(customText){
        selected.push(customText);
      }

      const blocksText = selected.join("\n");

      document.getElementById("blocks").value =
        blocksText;

      return blocksText;
    }


    /* 現在の入力内容を保存する */
    function saveAnshinInputs(){
      const theme =
        document
          .getElementById("theme")
          .value;

      const customBlocks =
        document
          .getElementById("customBlocks")
          .value;

      const selectedBlocks = [];

      document
        .querySelectorAll(".block-check:checked")
        .forEach((checkbox) => {
          selectedBlocks.push(checkbox.value);
        });

      localStorage.setItem(
        "anshinTheme",
        theme
      );

      localStorage.setItem(
        "anshinCustomBlocks",
        customBlocks
      );

      localStorage.setItem(
        "anshinSelectedBlocks",
        JSON.stringify(selectedBlocks)
      );

      collectBlocks();
    }


    /* 保存した入力内容を復元する */
    function loadAnshinInputs(){
      const savedTheme =
        localStorage.getItem("anshinTheme") || "";

      const savedCustomBlocks =
        localStorage.getItem("anshinCustomBlocks") || "";

      let savedSelectedBlocks = [];

      try{
        savedSelectedBlocks =
          JSON.parse(
            localStorage.getItem("anshinSelectedBlocks") ||
            "[]"
          );
      }catch(error){
        savedSelectedBlocks = [];
      }

      document.getElementById("theme").value =
        savedTheme;

      document.getElementById("customBlocks").value =
        savedCustomBlocks;

      document
        .querySelectorAll(".block-check")
        .forEach((checkbox) => {
          checkbox.checked =
            savedSelectedBlocks.includes(checkbox.value);
        });

      collectBlocks();
    }


    /* 思い出ナビへ進む */
    function goToMemory(){
  saveAnshinInputs();

  sessionStorage.setItem(
    "returnFromMemory",
    "true"
  );

  location.href = "omoide.html";
    }


    /* 思い出が保存されているか表示する */
    function updateMemorySavedNote(){
      const memoryChecks =
        localStorage.getItem("memoryChecks");

      const memoryText =
        (
          localStorage.getItem("memoryText") ||
          ""
        ).trim();

      let hasMemoryChecks = false;

      try{
        const parsedChecks =
          JSON.parse(memoryChecks || "[]");

        hasMemoryChecks =
          Array.isArray(parsedChecks) &&
          parsedChecks.length > 0;
      }catch(error){
        hasMemoryChecks = false;
      }

      const note =
        document.getElementById("memorySavedNote");

      if(hasMemoryChecks || memoryText){
        note.classList.remove("hidden");
      }else{
        note.classList.add("hidden");
      }
    }


    /* カードを引く前の確認 */
    function validateInputs(){
      const theme =
        document
          .getElementById("theme")
          .value
          .trim();

      const blocks = collectBlocks();

      if(!theme){
        alert("どうなったら嬉しいか入れてね😊");
        return false;
      }

      if(!blocks){
        alert(
          "今の気持ちに近いものを選ぶか、自分の言葉を入れてね🌿"
        );

        return false;
      }

      saveAnshinInputs();

      return true;
    }


    /* カード結果画面を開く */
    function openCardScreen(){
      document
        .getElementById("inputScreen")
        .classList
        .add("hidden");

      document
        .getElementById("cardScreen")
        .classList
        .remove("hidden");

      window.scrollTo({
        top:0,
        behavior:"smooth"
      });
    }


    function startDrawOne(){
      if(!validateInputs()){
        return;
      }

      openCardScreen();
      drawBossOne();
    }


    function startDrawThree(){
      if(!validateInputs()){
        return;
      }

      openCardScreen();
      drawBossThree();
    }


    function backToInput(){
      document
        .getElementById("cardScreen")
        .classList
        .add("hidden");

      document
        .getElementById("inputScreen")
        .classList
        .remove("hidden");

      window.scrollTo({
        top:0,
        behavior:"smooth"
      });
    }


    /* ページを開いたときの処理 */
window.addEventListener(
  "DOMContentLoaded",
  () => {
    const returnFromMemory =
      sessionStorage.getItem("returnFromMemory") === "true";

    if(returnFromMemory){
      loadAnshinInputs();
      sessionStorage.removeItem("returnFromMemory");
    }else{
      clearAnshinInputs();
    }

    updateMemorySavedNote();

    const themeInput =
      document.getElementById("theme");

    const customBlocksInput =
      document.getElementById("customBlocks");

    themeInput.addEventListener(
      "input",
      saveAnshinInputs
    );

    customBlocksInput.addEventListener(
      "input",
      saveAnshinInputs
    );

    document
      .querySelectorAll(".block-check")
      .forEach((checkbox) => {
        checkbox.addEventListener(
          "change",
          saveAnshinInputs
        );
      });
  }
);

/* 前回の安心ナビ入力を消す */
function clearAnshinInputs(){
  document.getElementById("theme").value = "";
  document.getElementById("customBlocks").value = "";
  document.getElementById("blocks").value = "";

  document
    .querySelectorAll(".block-check")
    .forEach((checkbox) => {
      checkbox.checked = false;
    });

  localStorage.removeItem("anshinTheme");
  localStorage.removeItem("anshinCustomBlocks");
  localStorage.removeItem("anshinSelectedBlocks");
  localStorage.removeItem("memoryChecks");
  localStorage.removeItem("memoryText");
}
    
  </script>

</body>
</html>
